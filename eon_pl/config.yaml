name: E.ON Polska
version: "1.1.17"
slug: eon_pl
description: "Automatyczne pobieranie zużycia energii z Mój E.ON do Home Assistant Energy Dashboard. Login email+hasło, MQTT auto-discovery, hourly statistics."
url: https://github.com/Fistacho/ha-eon-pl
arch:
  - aarch64
  - amd64
init: false
startup: services
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

services:
  - mqtt:want

options:
  email: ""
  password: ""
  scan_interval_hours: 6
  cookie_refresh_hours: 12
  selected_kus: []
  log_level: info
  mqtt_discovery: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ha_token: ""

schema:
  email: email
  password: password
  scan_interval_hours: int(1,24)
  cookie_refresh_hours: int(1,24)
  selected_kus:
    - str
  log_level: list(debug|info|warning|error)
  mqtt_discovery: bool
  mqtt_host: str?
  mqtt_port: int(1,65535)
  mqtt_user: str?
  mqtt_password: password?
  ha_token: password?

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: E.ON Polska Web UI

ingress: true
panel_icon: mdi:lightning-bolt-circle
panel_title: E.ON Polska
