name: E.ON Polska
version: "1.0.0"
slug: eon_pl
description: "Automatyczne pobieranie zużycia energii z Mój E.ON do Home Assistant Energy Dashboard. Login email+hasło, MQTT auto-discovery, hourly statistics."
url: https://github.com/Fistacho/ha-eon-pl
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: services
boot: auto
host_network: false
hassio_api: true
homeassistant_api: true
auth_api: true

services:
  - mqtt:want

options:
  email: ""
  password: ""
  scan_interval_hours: 6
  cookie_refresh_hours: 12
  selected_kus: []
  log_level: info
  mqtt_discovery: true

schema:
  email: email
  password: password
  scan_interval_hours: int(1,24)
  cookie_refresh_hours: int(1,24)
  selected_kus:
    - str
  log_level: list(debug|info|warning|error)
  mqtt_discovery: bool

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: E.ON Polska Web UI

ingress: true
ingress_port: 8099
panel_icon: mdi:lightning-bolt-circle
panel_title: E.ON Polska
