name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  lint:
    name: Lint addon config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run addon linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./eon_pl

  build:
    name: Build addon (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - aarch64
          - armv7
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build addon image (test only, no push)
        run: |
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.19 \
            --tag eon-pl-test:${{ matrix.arch }} \
            ./eon_pl
